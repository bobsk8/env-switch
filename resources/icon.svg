<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="activeCard" x1="22" y1="28" x2="74" y2="94" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="lockRing" x1="74" y1="76" x2="110" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <!-- ── Background ── -->
  <rect width="128" height="128" rx="22" fill="#13131f"/>
  <rect width="128" height="128" rx="22" fill="url(#bgGlow)"/>

  <!-- ── Back profile card (purple — second profile) ── -->
  <rect x="42" y="16" width="52" height="66" rx="9" fill="#2e1065"/>
  <rect x="42" y="16" width="52" height="66" rx="9" fill="#7c3aed" opacity="0.45"/>
  <!-- Content lines on back card -->
  <rect x="53" y="30" width="25" height="3" rx="1.5" fill="#c4b5fd" opacity="0.55"/>
  <rect x="53" y="39" width="19" height="3" rx="1.5" fill="#c4b5fd" opacity="0.38"/>
  <rect x="53" y="48" width="22" height="3" rx="1.5" fill="#c4b5fd" opacity="0.38"/>
  <rect x="53" y="57" width="15" height="3" rx="1.5" fill="#c4b5fd" opacity="0.28"/>
  <rect x="53" y="66" width="18" height="3" rx="1.5" fill="#c4b5fd" opacity="0.22"/>

  <!-- ── Front profile card (teal — active) ── -->
  <rect x="22" y="28" width="52" height="66" rx="9" fill="url(#activeCard)"/>
  <!-- Subtle inner highlight -->
  <rect x="22" y="28" width="52" height="20" rx="9" fill="white" opacity="0.08"/>

  <!-- Active indicator (green dot) -->
  <circle cx="36" cy="41" r="6" fill="#166534"/>
  <circle cx="36" cy="41" r="4" fill="#22c55e"/>
  <circle cx="36" cy="41" r="1.8" fill="#bbf7d0"/>

  <!-- Content lines on front card -->
  <rect x="45" y="38" width="23" height="3.5" rx="1.75" fill="white" opacity="0.90"/>
  <rect x="45" y="47" width="17" height="3.5" rx="1.75" fill="white" opacity="0.65"/>
  <rect x="45" y="56" width="20" height="3.5" rx="1.75" fill="white" opacity="0.65"/>
  <rect x="45" y="65" width="14" height="3.5" rx="1.75" fill="white" opacity="0.55"/>
  <rect x="45" y="74" width="18" height="3.5" rx="1.75" fill="white" opacity="0.42"/>
  <rect x="45" y="83" width="11" height="3.5" rx="1.75" fill="white" opacity="0.32"/>

  <!-- ── Switch arrows (vertical pair, right strip) ── -->
  <!-- Arrow ↓ dim -->
  <line x1="101" y1="38" x2="101" y2="52" stroke="#4b5563" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="97,48 101,52 105,48" stroke="#4b5563" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow ↑ bright -->
  <line x1="113" y1="58" x2="113" y2="44" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="109,48 113,44 117,48" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- ── Lock badge (bottom-right corner) ── -->
  <!-- Outer dark ring separates badge from background -->
  <circle cx="90" cy="93" r="20" fill="#13131f"/>
  <!-- Teal ring border -->
  <circle cx="90" cy="93" r="19" stroke="url(#lockRing)" stroke-width="2.5" fill="#1a1a2e"/>
  <!-- Lock body -->
  <rect x="81" y="93" width="18" height="14" rx="4" fill="#22d3ee"/>
  <!-- Lock shackle -->
  <path d="M85 93 L85 88 Q85 83.5 90 83.5 Q95 83.5 95 88 L95 93"
        stroke="#22d3ee" stroke-width="2.8" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Keyhole -->
  <circle cx="90" cy="100" r="2.8" fill="#0e7490"/>
  <rect x="88.8" y="100" width="2.4" height="4.5" rx="1.2" fill="#0e7490"/>
</svg>
